<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative dollar sign -->
  <g transform="translate(1050, 240)" opacity="0.08">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="320" font-weight="900" fill="#00d4aa" text-anchor="middle">$</text>
  </g>

  <!-- Main title -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="82" font-weight="900" fill="white" letter-spacing="-2">
    cheap-openclaw
  </text>

  <!-- Accent line -->
  <rect x="80" y="200" width="200" height="4" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#a0a0b0" font-weight="400">
    14 production-tested techniques to cut
  </text>
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#a0a0b0" font-weight="400">
    your OpenClaw agent costs by 10x
  </text>

  <!-- Key stats -->
  <g transform="translate(80, 360)">
    <rect x="0" y="0" width="240" height="70" rx="8" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
    <text x="20" y="28" font-family="ui-monospace, monospace" font-size="14" fill="#00d4aa" font-weight="600">MODEL ROUTING</text>
    <text x="20" y="55" font-family="ui-monospace, monospace" font-size="22" fill="white" font-weight="700">80% on Haiku</text>
  </g>
  <g transform="translate(350, 360)">
    <rect x="0" y="0" width="240" height="70" rx="8" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
    <text x="20" y="28" font-family="ui-monospace, monospace" font-size="14" fill="#00d4aa" font-weight="600">CRON TIERING</text>
    <text x="20" y="55" font-family="ui-monospace, monospace" font-size="22" fill="white" font-weight="700">15x savings</text>
  </g>
  <g transform="translate(620, 360)">
    <rect x="0" y="0" width="240" height="70" rx="8" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
    <text x="20" y="28" font-family="ui-monospace, monospace" font-size="14" fill="#00d4aa" font-weight="600">PROMPT CACHE</text>
    <text x="20" y="55" font-family="ui-monospace, monospace" font-size="22" fill="white" font-weight="700">90% discount</text>
  </g>

  <!-- Footer -->
  <text x="80" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#606070">
    Battle-tested on Spratt, a 24/7 autonomous OpenClaw agent
  </text>
  <text x="80" y="555" font-family="ui-monospace, monospace" font-size="16" fill="#404050">
    github.com/kmanan/cheap-openclaw
  </text>
</svg>
